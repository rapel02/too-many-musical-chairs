<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Song Point Generator</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background-color: #f4f7f6; }

        /* LEFT SIDE */
        .left-panel {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-right: 2px solid #e0e0e0;
            padding: 30px;
            text-align: center;
        }

        .input-box { margin-bottom: 20px; }
        input {
            width: 80px;
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid #2d3436;
            border-radius: 5px;
            text-align: center;
        }

        audio { width: 100%; max-width: 300px; margin: 20px 0; }

        button {
            padding: 10px 20px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #00a884; }

        /* RIGHT SIDE */
        .right-panel { flex: 1; padding: 40px; overflow-y: auto; }
        #resultsGrid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .point-item {
            background: #2d3436;
            color: #fab1a0;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: popIn 0.3s ease forwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <h2>Song Game</h2>
        
        <div class="input-box">
            <label style="display: block; margin-bottom: 8px;">Enter Number (X):</label>
            <input type="number" id="inputX" value="10" min="1">
        </div>

        <button onclick="loadRandomSong()">Load Random Song</button>
        
        <p id="songName" style="margin-top: 10px; font-style: italic; color: #636e72;">No song loaded</p>

        <audio id="audioPlayer" controls></audio>
        
        <!-- <p style="color: #636e72; font-size: 0.8rem;">
            Song will auto-pause between 30-55s.
        </p> -->
    </div>

    <div class="right-panel">
        <div id="resultsGrid"></div>
    </div>

    <script>

        const audio = document.getElementById('audioPlayer');
        const grid = document.getElementById('resultsGrid');
        const inputX = document.getElementById('inputX');
        const songNameDisplay = document.getElementById('songName');

        let stopTime = 0;
        let hasPausedForThisRound = false;

        function loadRandomSong() {
            // Reset state
            hasPausedForThisRound = false;
            grid.innerHTML = '';
            
            // Pick a random song from the list
            const randomSong = Math.floor(Math.random() * 10);
            audio.src = `songs/${randomSong}.mp3`; // Points to your "songs" directory
            songNameDisplay.textContent = `Playing: ${randomSong}`;

            // Calculate random stop time: 30 <= t <= 55
            stopTime = Math.floor(Math.random() * (55 - 30 + 1)) + 30;
            console.log(`Song will auto-pause at: ${stopTime}s`);
            
            audio.load();
        }

        // Auto-pause logic
        audio.ontimeupdate = function() {
            if (!hasPausedForThisRound && audio.currentTime >= stopTime) {
                hasPausedForThisRound = true; // Prevents infinite pausing loop
                audio.pause();
            }
        };

        // Point generation logic (triggers on any pause)
        audio.onpause = function() {
            const x = parseInt(inputX.value);
            if (isNaN(x) || x < 1) return;

            grid.innerHTML = '';
            let pointsArray = Array.from({length: x}, (_, i) => i + 1);
            pointsArray = shuffle(pointsArray);

            for (let i = 0; i < x; i++) {
                const item = document.createElement('div');
                item.className = 'point-item';
                item.textContent = `${i + 1}: ${pointsArray[i]} points`;
                grid.appendChild(item);
            }
        };

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Initialize with a song on load
        window.onload = loadRandomSong;
    </script>

</body>
</html>
